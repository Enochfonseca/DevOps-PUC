name: Continuous Integration
on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Python Lint Code Scanning Action
        uses: advanced-security/python-lint-code-scanning-action@v1.1.3
        with:
          linter: pylint

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false   # CI normalmente não publica, só valida
          tags: ghcr.io/${{ github.repository_owner }}/app:ci-test

  discord:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        uses: Ilshidur/action-discord@master
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          message: "CI finalizado para ${{ github.repository }} (workflow: ${{ github.workflow }})"




    discord:
      runs-on: ubuntu-latest
      steps:
        - name: Discord Webhook Action
          uses: tsickert/discord-webhook@v7.0.0
          with:
            webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
            content: "Test"
